server {
    listen 80;
    server_name localhost; # Replace with your domain or server IP

    # Redirect /dashboard (without trailing slash) to /dashboard/
    location = /dashboard {
        return 301 $scheme://$http_host/dashboard/;
    }

    # Serve Vue 3 Frontend at /dashboard/
    location /dashboard/ {
        alias /home/bitsysdev/serverwatch/monitor-ui/dist/;
        index index.html;
        try_files $uri $uri/ /dashboard/index.html;
    }

    # Proxy API requests to Laravel API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: Proxy Prometheus
    location /prometheus/ {
        proxy_pass http://127.0.0.1:9091/;
    }

    # Optional: Proxy Grafana
    location /grafana/ {
        proxy_pass http://127.0.0.1:3010/;
    }

    # Optional: Proxy Uptime Kuma
    location /status/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
