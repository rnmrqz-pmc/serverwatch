# HTTP → HTTPS redirect
server {
    listen 80;
    server_name 172.22.2.139;

    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name 172.22.2.139;

    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Redirect /watcher → /watcher/
    location = /watcher {
        return 301 https://$host/watcher/;
    }

    # Vue Frontend
    location /watcher/ {
        alias /home/bitsysdev/serverwatch/monitor-ui/dist/;
        index index.html;
        try_files $uri $uri/ /watcher/index.html;
    }

    # Laravel API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Prometheus
    location /prometheus/ {
        proxy_pass http://127.0.0.1:9091/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Redirect /login to /grafana/login
    location = /login {
        return 301 https://$host/grafana/login;
    }

    # Grafana
    location /grafana/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Uptime Kuma
    location /status/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Block dotfiles
    location ~ /\.(?!well-known).* {
        deny all;
        return 404;
    }
}