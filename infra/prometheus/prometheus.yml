global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'serverwatch'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - "/etc/prometheus/alerts.yml"

scrape_configs:

  # Mock / local node-exporter (dev/testing)
  - job_name: 'node-mock'
    static_configs:
      - targets:
          - 'node-exporter:9100'
        labels:
          env: 'production'

  # Mock mysqld_exporter — scrapes the mariadb-mock container
  - job_name: 'mysql-mock'
    static_configs:
      - targets:
          - 'mysqld-exporter:9104'
        labels:
          env: 'production'

  # Production web nodes — Node Exporter (system metrics)
  # Prometheus runs in Docker; the Laravel API must be reachable from the
  # container at host.docker.internal:8080 for HTTP service discovery.
  - job_name: 'node'
    http_sd_configs:
      - url: 'https://172.22.2.139/api/prometheus/targets/node'
        refresh_interval: 30s
        tls_config:
          insecure_skip_verify: true

  - job_name: 'postgres'
    http_sd_configs:
      - url: 'https://172.22.2.139/api/prometheus/targets/postgres'
        refresh_interval: 30s
        tls_config:
          insecure_skip_verify: true

  - job_name: 'mysql'
    http_sd_configs:
      - url: 'https://172.22.2.139/api/prometheus/targets/mysql'
        refresh_interval: 30s
        tls_config:
          insecure_skip_verify: true

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
