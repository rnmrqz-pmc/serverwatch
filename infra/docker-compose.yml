version: "3.9"

networks:
  monitor:
    driver: bridge

volumes:
  prometheus_data: {}
  grafana_data: {}
  uptime_kuma_data: {}
  mariadb_data: {}

services:
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    ports:
      - "9091:9090"
    networks: [monitor]

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./alertmanager:/etc/alertmanager
    ports:
      - "9093:9093"
    networks: [monitor]

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_DOMAIN=172.22.2.139
      - GF_SERVER_ROOT_URL=https://172.22.2.139/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3010:3000"
    networks: [monitor]

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "3001:3001"
    networks: [monitor]

  # ── Mock target: Node Exporter ──────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks: [monitor]

  # ── Mock target: MariaDB database ─────────────────────────────────────────
  mariadb:
    image: mariadb:11.4
    container_name: mariadb-mock
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root_pass
      MARIADB_USER: monitor
      MARIADB_PASSWORD: monitor_pass
      MARIADB_DATABASE: appdb
    volumes:
      - mariadb_data:/var/lib/mysql
    networks: [monitor]

  # ── Mock target: mysqld_exporter (scrapes the mariadb container) ────────────
  mysqld-exporter:
    image: prom/mysqld-exporter:latest
    container_name: mysqld-exporter
    restart: unless-stopped
    command:
      - '--config.my-cnf=/etc/mysqld-exporter/.my.cnf'
    volumes:
      - ./mysqld-exporter/.my.cnf:/etc/mysqld-exporter/.my.cnf:ro
    ports:
      - "9104:9104"
    networks: [monitor]
    depends_on:
      - mariadb
